{% extends "base.html" %}
{% block title %}Edit Student — Admin Panel{% endblock %}

{% block content %}
<div class="page-header">
  <div class="container">
    <h1><i class="bi bi-pencil me-2"></i>Edit Student</h1>
    <p class="mb-0 opacity-75">Update student account details</p>
  </div>
</div>

<div class="container pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="card">
        <div class="card-header"><i class="bi bi-person me-2"></i>Student #{{ student.id }}</div>
        <div class="card-body p-4">
          <form method="POST">
            <div class="mb-3">
              <label class="form-label" for="es_name">Full Name</label>
              <input type="text" name="name" id="es_name" class="form-control"
                     value="{{ student.name }}" required/>
            </div>
            <div class="mb-3">
              <label class="form-label" for="es_email">Email</label>
              <input type="email" name="email" id="es_email" class="form-control"
                     value="{{ student.email }}" required/>
            </div>
            <div class="mb-4">
              <label class="form-label" for="es_phone">Phone</label>
              <input type="text" name="phone" id="es_phone" class="form-control"
                     value="{{ student.phone or '' }}"/>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-fill">
                <i class="bi bi-save me-2"></i>Save Changes
              </button>
              <a href="{{ url_for('admin_students') }}" class="btn btn-secondary flex-fill">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
